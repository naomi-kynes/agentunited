name: Integration Test (Linux)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run setup.sh
        run: chmod +x ./setup.sh && ./setup.sh

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for services to be healthy..."
          for i in $(seq 1 30); do
            UNHEALTHY=$(docker compose ps --format json | jq -r 'select(.Health == "starting" or .Health == "unhealthy") | .Name' 2>/dev/null)
            if [ -z "$UNHEALTHY" ]; then
              echo "All services healthy ✅"
              break
            fi
            echo "Still waiting... ($i/30)"
            sleep 3
          done
          docker compose ps

      - name: Smoke tests
        run: |
          BASE=http://localhost:8080/api/v1

          echo "1. Health check..."
          curl -sf http://localhost:8080/health || { echo "❌ Health check failed"; exit 1; }
          echo "✅ Health OK"

          echo "2. Register user..."
          RESPONSE=$(curl -sf -X POST $BASE/auth/register \
            -H "Content-Type: application/json" \
            -d '{"email":"ci@test.com","password":"testpass123","display_name":"CI Bot"}')
          TOKEN=$(echo $RESPONSE | jq -r '.token // empty')
          [ -z "$TOKEN" ] && { echo "❌ Register failed: $RESPONSE"; exit 1; }
          echo "✅ Register OK"

          echo "3. Create channel..."
          RESPONSE=$(curl -sf -X POST $BASE/channels \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"name":"ci-test","description":"CI test channel"}')
          CHANNEL_ID=$(echo $RESPONSE | jq -r '.channel.id // .id // empty')
          [ -z "$CHANNEL_ID" ] && { echo "❌ Create channel failed: $RESPONSE"; exit 1; }
          echo "✅ Create channel OK"

          echo "4. Send message..."
          curl -sf -X POST $BASE/channels/$CHANNEL_ID/messages \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"content":"hello from CI"}' || { echo "❌ Send message failed"; exit 1; }
          echo "✅ Send message OK"

          echo "5. Bootstrap API..."
          RESPONSE=$(curl -sf -X POST $BASE/bootstrap \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"agent_name":"ci-agent","display_name":"CI Agent"}')
          INVITE=$(echo $RESPONSE | jq -r '.invite_url // empty')
          [ -z "$INVITE" ] && { echo "❌ Bootstrap failed: $RESPONSE"; exit 1; }
          echo "✅ Bootstrap OK — invite_url present"

          echo ""
          echo "All smoke tests passed ✅"

      - name: Cleanup
        if: always()
        run: docker compose down -v
